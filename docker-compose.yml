version: "3.8"

services:

  online_shop:
    build:
      context: .
    container_name: online_shop
    ports:
      - "5173:80"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173/"]
      interval: 60s
      timeout: 10s
      retries: 5
    networks:
      - online_shop
  
  cAdvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    ports:
      - "7070:8080"
    restart: always
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 60s
      timeout: 10s
      retries: 5
    networks:
      - online_shop
  
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    ports:
      - "9100:9100"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9100/metrics"]
      interval: 60s
      timeout: 10s
      retries: 5
    networks:
      - online_shop

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 60s
      timeout: 10s
      retries: 5
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - online_shop

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    restart: always
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/"]
      interval: 60s
      timeout: 10s
      retries: 5
    networks:
      - online_shop

  grafana-loki:
    image: grafana/loki:latest
    container_name: grafana-loki
    ports:
      - "3100:3100"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/"]
      interval: 60s
      timeout: 10s
      retries: 5
    volumes:
      - loki_data:/loki
    networks:
      - online_shop

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      - /var/log:/var/log:ro
    networks:
      - online_shop
    ports:
      - "9080:9080"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9080/"]
      interval: 60s
      timeout: 10s
      retries: 5
      
networks:
  online_shop:
    driver: bridge

volumes:
  online_shop_data:
  prometheus_data: {}
  grafana_data: {}
  loki_data: {}
